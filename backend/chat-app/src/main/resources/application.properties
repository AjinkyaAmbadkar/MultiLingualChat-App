spring.application.name=chat-app

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=translation-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.multilingual.chat.app.dto
# Start from earliest unprocessed message on restart — ensures no jobs are lost
spring.kafka.consumer.auto-offset-reset=earliest

# Caffeine cache — user language lookups
# maximumSize: evict least-recently-used entries beyond this count
# expireAfterWrite: safety TTL so stale entries never live forever
spring.cache.type=caffeine
spring.cache.cache-names=userLanguage
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60m

spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=chatapp_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 7 (Spring Boot 4.x) no longer auto-detects the dialect from JDBC metadata
# by default — it needs this set explicitly. Without it, any DB connection failure
# shows as the confusing "Unable to determine Dialect without JDBC metadata" error
# instead of the real cause (wrong password, DB not running, etc.)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
# Listen on all network interfaces so devices on the same WiFi can reach this server.
# 0.0.0.0 means "accept connections on any IP this machine has" (localhost + WiFi IP etc.)
server.address=0.0.0.0

# Logging Configuration
# Root level: WARN (reduces noise from Spring internals)
# Our app package: INFO (see all our log.info() calls)
# Change to DEBUG for our package when you want extra detail during development
logging.level.root=WARN
logging.level.com.multilingual.chat.app=DEBUG

# OpenAI Configuration
# NEVER hardcode secrets — set this as an environment variable in your terminal or IDE
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# Google OAuth2 Configuration
# The Client ID from Google Cloud Console → APIs & Services → Credentials
# This is NOT a secret — it's a public identifier embedded in the frontend too.
# We still read it from an env var to keep config flexible across environments.
google.client-id=${GOOGLE_CLIENT_ID}

# JWT Configuration
# Generate a secret with: openssl rand -base64 32
# Then set it as an environment variable — never hardcode it here.
jwt.secret=${JWT_SECRET}
# Access token expires in 15 minutes (milliseconds)
jwt.access-token-expiration=900000
# Refresh token expires in 7 days (milliseconds)
jwt.refresh-token-expiration=604800000
