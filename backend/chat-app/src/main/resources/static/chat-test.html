<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MultiLingual Chat — WebSocket Test</title>

  <!--
    STOMP.js  — the JavaScript STOMP client (matches what Spring Boot uses server-side)
    SockJS    — the JavaScript SockJS client (matches withSockJS() in WebSocketConfig.java)
    We load them from CDN so no npm/build step is needed.
  -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6/bundles/stomp.umd.min.js"></script>

  <!--
    Google Identity Services SDK — provides the Sign-In button and One Tap prompt.
    callback="handleGoogleCredential" is invoked by Google with the ID token after
    the user approves. We then send that token to POST /auth/google on our server.
  -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ── Reset & base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app {
      width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #075e54;
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #128c7e;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #f44336;
      margin-left: auto;
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.connected { background: #4caf50; }

    /* ── Panels ─────────────────────────────────────────── */
    .panel {
      padding: 16px 20px;
      border-bottom: 1px solid #e9edef;
      background: #fafafa;
    }
    .panel h2 {
      font-size: 11px;
      color: #667781;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      font-weight: 600;
    }
    .field-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .field-group { flex: 1; }
    .field-group label { font-size: 12px; color: #667781; display: block; margin-bottom: 3px; }
    .field-group input, .field-group select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d7db;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }
    .field-group input:focus, .field-group select:focus { border-color: #075e54; }
    .field-group input:disabled { background: #f5f5f5; color: #999; }

    .btn-primary {
      width: 100%;
      padding: 9px;
      background: #075e54;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    .btn-primary:hover    { background: #128c7e; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

    .status-label {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      display: none;
    }
    .status-label.ok    { background: #e8f5e9; color: #2e7d32; display: block; }
    .status-label.err   { background: #fdecea; color: #b71c1c; display: block; }

    /* ── Message window ─────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #efeae2;
    }
    .bubble-wrapper { display: flex; flex-direction: column; }
    .bubble-wrapper.sent  { align-items: flex-end; }
    .bubble-wrapper.recv  { align-items: flex-start; }
    .bubble {
      max-width: 78%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }
    .bubble.sent { background: #d9fdd3; border-top-right-radius: 2px; }
    .bubble.recv { background: #fff; border-top-left-radius: 2px; }
    .bubble .original {
      font-size: 12px; color: #888;
      margin-top: 4px;
      border-top: 1px solid rgba(0,0,0,.07);
      padding-top: 3px;
    }
    .bubble .meta { font-size: 10px; color: #999; margin-top: 4px; text-align: right; }
    .system-msg {
      text-align: center; font-size: 11px; color: #667781;
      background: rgba(255,255,255,.6);
      border-radius: 8px; padding: 4px 10px; align-self: center;
    }

    /* ── Send bar ───────────────────────────────────────── */
    #send-bar { padding: 10px 12px; background: #f0f2f5; border-top: 1px solid #e9edef; }
    .send-top { display: flex; gap: 8px; margin-bottom: 8px; }
    .send-top input, .send-top select {
      flex: 1; padding: 8px 10px;
      border: 1px solid #d1d7db; border-radius: 8px;
      font-size: 13px; background: #fff; outline: none;
    }
    .send-top input:focus, .send-top select:focus { border-color: #075e54; }
    .send-bottom { display: flex; gap: 8px; }
    #msg-input {
      flex: 1; padding: 10px 14px;
      border: 1px solid #d1d7db; border-radius: 22px;
      font-size: 14px; background: #fff; outline: none;
    }
    #msg-input:focus { border-color: #075e54; }
    #btn-send {
      width: 42px; height: 42px; border-radius: 50%;
      background: #075e54; color: #fff; border: none;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; flex-shrink: 0;
    }
    #btn-send:hover    { background: #128c7e; }
    #btn-send:disabled { background: #aaa; cursor: not-allowed; }

    /* ── Google Sign-In button ──────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 10px 0; color: #999; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e9edef;
    }
    .btn-google {
      width: 100%; padding: 9px;
      background: #fff; color: #3c4043;
      border: 1px solid #d1d7db;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: background .2s, box-shadow .2s;
      margin-top: 4px;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
    .btn-google svg   { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Log panel ──────────────────────────────────────── */
    details { border-top: 1px solid #e9edef; background: #fafafa; }
    summary { padding: 8px 14px; font-size: 11px; color: #667781; cursor: pointer; user-select: none; }
    #log { max-height: 120px; overflow-y: auto; padding: 0 14px 8px; font-size: 11px; font-family: monospace; color: #333; }
    #log .log-info  { color: #075e54; }
    #log .log-error { color: #f44336; }
    #log .log-recv  { color: #0077cc; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar" id="avatar">?</div>
    <div>
      <h1 id="header-name">MultiLingual Chat</h1>
      <p id="header-sub">Not connected</p>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </header>

  <!--
    ══════════════════════════════════════════════════════
    PHASE 6: STEP 1 — Login with email + password
    We POST to /auth/login, get back an accessToken + userId.
    The token goes into the STOMP CONNECT headers.
    ══════════════════════════════════════════════════════
  -->
  <div class="panel" id="login-panel">
    <h2>Step 1 — Login</h2>
    <div class="field-row">
      <div class="field-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com"/>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="password"/>
      </div>
    </div>
    <button class="btn-primary" id="btn-login">Login</button>

    <div class="divider">or</div>

    <!--
      Google Sign-In button.
      Clicking this triggers Google's Identity Services popup.
      On success, Google calls handleGoogleCredential(response) with the ID token.

      data-client_id  — your Google Cloud OAuth2 Client ID (replace the placeholder!)
      data-callback   — JS function Google calls after the user approves
      data-auto_select — false: don't auto-sign in silently (good for a test page)
    -->
    <div id="g_id_onload"
         data-client_id="341789138413-lc0evlvskf9mq747k8r5n2a4dle671if.apps.googleusercontent.com"
         data-callback="handleGoogleCredential"
         data-auto_select="false">
    </div>
    <button class="btn-google" id="btn-google-login" onclick="triggerGoogleLogin()">
      <!-- Official Google 'G' logo SVG -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="status-label" id="login-status"></div>
  </div>

  <!--
    ══════════════════════════════════════════════════════
    STEP 2 — Connect to WebSocket (visible after login)
    JWT is passed automatically in STOMP CONNECT headers.
    ══════════════════════════════════════════════════════
  -->
  <div class="panel" id="connect-panel" style="display:none">
    <h2>Step 2 — Connect to Chat</h2>
    <div class="field-row">
      <div class="field-group">
        <label>Logged in as</label>
        <input id="display-name" type="text" disabled/>
      </div>
      <div class="field-group">
        <label>My Language</label>
        <select id="my-lang">
          <option value="English">English</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Hindi">Hindi</option>
          <option value="Marathi">Marathi</option>
          <option value="Japanese">Japanese</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Mandarin">Mandarin</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" id="btn-connect">Connect to Chat</button>
  </div>

  <!-- Chat Messages -->
  <div id="messages">
    <div class="system-msg">Login above, then connect to start chatting 💬</div>
  </div>

  <!-- Send Bar -->
  <div id="send-bar">
    <div class="send-top">
      <div style="flex:1">
        <input id="to-user-id" type="number" placeholder="Send to User ID" min="1"/>
      </div>
      <div style="flex:1">
        <select id="to-lang">
          <option value="Spanish">→ Spanish</option>
          <option value="English">→ English</option>
          <option value="French">→ French</option>
          <option value="German">→ German</option>
          <option value="Hindi">→ Hindi</option>
          <option value="Marathi">→ Marathi</option>
          <option value="Japanese">→ Japanese</option>
          <option value="Portuguese">→ Portuguese</option>
          <option value="Mandarin">→ Mandarin</option>
        </select>
      </div>
    </div>
    <div class="send-bottom">
      <input id="msg-input" type="text" placeholder="Type a message…" disabled/>
      <button id="btn-send" disabled>➤</button>
    </div>
  </div>

  <!-- Debug Log (collapsed by default) -->
  <details>
    <summary>🔧 WebSocket debug log</summary>
    <div id="log"></div>
  </details>

</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let stompClient  = null;
  let myUserId     = null;   // filled from /auth/login response
  let myName       = "Me";   // filled from /auth/login response
  let myLang       = "English";
  let accessToken  = null;   // JWT — filled from /auth/login response

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const loginPanel   = document.getElementById('login-panel');
  const connectPanel = document.getElementById('connect-panel');
  const btnLogin     = document.getElementById('btn-login');
  const btnConnect   = document.getElementById('btn-connect');
  const btnSend      = document.getElementById('btn-send');
  const msgInput     = document.getElementById('msg-input');
  const messagesDiv  = document.getElementById('messages');
  const statusDot    = document.getElementById('status-dot');
  const avatar       = document.getElementById('avatar');
  const headerName   = document.getElementById('header-name');
  const headerSub    = document.getElementById('header-sub');
  const logDiv       = document.getElementById('log');
  const loginStatus  = document.getElementById('login-status');

  // ── Logging helper ────────────────────────────────────────────────────────
  function addLog(msg, type = 'info') {
    const line = document.createElement('div');
    line.className = 'log-' + type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(line);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // ── Google Sign-In ────────────────────────────────────────────────────────
  //
  // triggerGoogleLogin() — manually opens the Google sign-in popup.
  // Google Identity Services renders its own button via the g_id_onload div,
  // but we also wire a custom styled button here for consistent UI.
  //
  function triggerGoogleLogin() {
    if (typeof google === 'undefined') {
      showLoginStatus('Google SDK not loaded. Check your internet connection.', false);
      return;
    }
    google.accounts.id.initialize({
      client_id: document.getElementById('g_id_onload').dataset.client_id,
      callback: handleGoogleCredential
    });
    google.accounts.id.prompt();
  }

  // Called by Google SDK after the user approves.
  // response.credential is the signed Google ID Token (a JWT string).
  async function handleGoogleCredential(response) {
    const idToken = response.credential;
    addLog('Google credential received — sending to /auth/google…');

    const btn = document.getElementById('btn-google-login');
    btn.disabled = true;

    try {
      const resp = await fetch('/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });

      if (resp.status === 409) {
        throw new Error('This email is already registered with a password. Please use the email/password login instead.');
      }
      if (!resp.ok) {
        throw new Error(`Google login failed (HTTP ${resp.status})`);
      }

      const data = await resp.json();
      accessToken = data.accessToken;
      myUserId    = data.userId;
      myName      = data.name || data.email;

      addLog(`✅ Google login OK — ${myName} (userId: ${myUserId})`);
      showLoginStatus(`Logged in as ${myName} (Google)`, true);

      document.getElementById('display-name').value = `${myName} (ID: ${myUserId})`;
      document.getElementById('connect-panel').style.display = 'block';
      document.getElementById('btn-login').textContent = 'Logged in ✓';
      document.getElementById('btn-login').disabled = true;
      btn.textContent = '✓ Signed in with Google';

    } catch (err) {
      addLog(`Google login failed: ${err.message}`, 'error');
      showLoginStatus(err.message, false);
      btn.disabled = false;
    }
  }

  // ── STEP 1: Login ─────────────────────────────────────────────────────────
  // POST /auth/login → get accessToken + userId + name back from the server.
  // Store them in state so we can:
  //   - Pass accessToken in the STOMP CONNECT headers (WebSocket auth)
  //   - Subscribe to /topic/user.{myUserId} (our personal message channel)
  btnLogin.addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      showLoginStatus('Please enter email and password.', false);
      return;
    }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Logging in…';
    loginStatus.className = 'status-label';

    try {
      const resp = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      // AuthResponseDto fields: accessToken, refreshToken, tokenType, userId, email, name
      accessToken = data.accessToken;
      myUserId    = data.userId;
      myName      = data.name || email;

      addLog(`✅ Login OK — ${myName} (userId: ${myUserId})`);
      showLoginStatus(`Logged in as ${myName} (ID: ${myUserId})`, true);

      // Reveal the connect panel and pre-fill the display name
      document.getElementById('display-name').value = `${myName} (ID: ${myUserId})`;
      connectPanel.style.display = 'block';
      btnLogin.textContent = 'Logged in ✓';

    } catch (err) {
      addLog(`Login failed: ${err.message}`, 'error');
      showLoginStatus(`Login failed: ${err.message}`, false);
      btnLogin.disabled = false;
      btnLogin.textContent = 'Login';
    }
  });

  function showLoginStatus(msg, success) {
    loginStatus.textContent = msg;
    loginStatus.className = 'status-label ' + (success ? 'ok' : 'err');
  }

  // ── STEP 2: Connect to WebSocket ──────────────────────────────────────────
  // Phase 6 key change: we pass the JWT in the STOMP CONNECT frame headers.
  //
  // Why not in the HTTP handshake?
  //   Browser WebSocket API does not allow custom HTTP headers on the upgrade request.
  //   SockJS works around this but it's not reliable across all transports.
  //   The STOMP CONNECT frame is the proper authentication point for STOMP-over-WebSocket.
  //
  // On the server side, JwtChannelInterceptor.preSend() reads "Authorization" from
  // the native STOMP headers on CONNECT frames and validates the JWT.
  //
  btnConnect.addEventListener('click', () => {
    if (!accessToken) {
      alert('Please login first!');
      return;
    }

    myLang = document.getElementById('my-lang').value;

    addLog(`Connecting as ${myName} (userId: ${myUserId}, lang: ${myLang})…`);
    btnConnect.disabled = true;
    btnConnect.textContent = 'Connecting…';

    /*
     * Auto-detect the server URL from the page's own origin.
     * Works for localhost and for WiFi IPs automatically.
     */
    const serverUrl = window.location.origin + '/ws';
    addLog(`WebSocket endpoint: ${serverUrl}`);
    const socket = new SockJS(serverUrl);

    stompClient = new StompJs.Client({
      webSocketFactory: () => socket,
      reconnectDelay: 5000,

      /*
       * PHASE 6: Pass the JWT in STOMP CONNECT headers.
       *
       * connectHeaders is sent as native STOMP headers inside the CONNECT frame.
       * Server reads it via: accessor.getFirstNativeHeader("Authorization")
       *
       * This is how STOMP authentication works — the CONNECT frame is the
       * WebSocket equivalent of an HTTP Authorization header.
       */
      connectHeaders: {
        'Authorization': 'Bearer ' + accessToken
      },

      onConnect: () => {
        addLog(`✅ Connected! Subscribed to /topic/user.${myUserId}`, 'info');

        /*
         * Subscribe to our personal topic.
         * This matches what ChatWebSocketController.java pushes to:
         *   messagingTemplate.convertAndSend("/topic/user." + userId, message)
         *
         * Every message delivered here is a JSON-serialized MessageResponseDto.
         */
        stompClient.subscribe(`/topic/user.${myUserId}`, (frame) => {
          addLog(`📨 Message received on /topic/user.${myUserId}`, 'recv');
          const data = JSON.parse(frame.body);
          renderMessage(data);
        });

        // Update UI to connected state
        statusDot.classList.add('connected');
        avatar.textContent     = myName[0].toUpperCase();
        headerName.textContent = `${myName} (ID: ${myUserId})`;
        headerSub.textContent  = `Connected · ${myLang}`;
        btnConnect.textContent = 'Connected ✓';
        msgInput.disabled      = false;
        btnSend.disabled       = false;
        addSystemMessage(`You joined as ${myName} 👋`);
      },

      onDisconnect: () => {
        addLog('🔴 Disconnected', 'error');
        statusDot.classList.remove('connected');
        headerSub.textContent  = 'Disconnected';
        btnConnect.disabled    = false;
        btnConnect.textContent = 'Reconnect';
        msgInput.disabled      = true;
        btnSend.disabled       = true;
      },

      onStompError: (frame) => {
        addLog(`STOMP error: ${frame.headers?.message}`, 'error');
      }
    });

    stompClient.activate();
  });

  // ── Send message ──────────────────────────────────────────────────────────
  function sendMessage() {
    const text       = msgInput.value.trim();
    const toUserId   = document.getElementById('to-user-id').value.trim();
    const targetLang = document.getElementById('to-lang').value;

    if (!text)     { alert('Type a message first!'); return; }
    if (!toUserId) { alert('Enter the receiver\'s User ID!'); return; }
    if (!stompClient?.connected) { alert('Not connected!'); return; }

    /*
     * Phase 6 change: senderId is GONE from the payload.
     *
     * Before: { senderId: 1, receiverId: 2, ... }
     * After:  { receiverId: 2, ... }
     *
     * The server derives senderId from the JWT Principal set during STOMP CONNECT.
     * Any attempt to put senderId back would simply be ignored by the server
     * because SendMessageRequestDto no longer has that field.
     */
    const payload = {
      receiverId:       parseInt(toUserId),
      originalText:     text,
      originalLanguage: myLang,
      targetLanguage:   targetLang
    };

    addLog(`📤 Sending to /app/chat.send → ${JSON.stringify(payload)}`);

    stompClient.publish({
      destination: '/app/chat.send',
      body: JSON.stringify(payload)
    });

    msgInput.value = '';
    msgInput.focus();
  }

  btnSend.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Render a received MessageResponseDto ──────────────────────────────────
  function renderMessage(data) {
    /*
     * data shape (MessageResponseDto.java):
     *   id, senderId, receiverId, originalText, translatedText,
     *   originalLanguage, targetLanguage, timestamp
     */
    const isSent      = String(data.senderId) === String(myUserId);
    const wrapper     = document.createElement('div');
    wrapper.className = 'bubble-wrapper ' + (isSent ? 'sent' : 'recv');

    const bubble      = document.createElement('div');
    bubble.className  = 'bubble ' + (isSent ? 'sent' : 'recv');

    const mainText    = document.createElement('div');
    mainText.textContent = isSent
      ? data.originalText
      : data.translatedText;

    const subText     = document.createElement('div');
    subText.className = 'original';
    subText.textContent = isSent
      ? `→ ${data.targetLanguage}: ${data.translatedText}`
      : `Original (${data.originalLanguage}): ${data.originalText}`;

    const meta        = document.createElement('div');
    meta.className    = 'meta';
    const ts          = data.timestamp
      ? new Date(data.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      : '';
    meta.textContent  = (isSent ? 'You' : `User ${data.senderId}`) + (ts ? ` · ${ts}` : '');

    bubble.appendChild(mainText);
    bubble.appendChild(subText);
    bubble.appendChild(meta);
    wrapper.appendChild(bubble);
    messagesDiv.appendChild(wrapper);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    const placeholder = messagesDiv.querySelector('.system-msg');
    if (placeholder) placeholder.remove();
  }

  // ── System message (connection events etc.) ────────────────────────────────
  function addSystemMessage(text) {
    const el = document.createElement('div');
    el.className  = 'system-msg';
    el.textContent = text;
    messagesDiv.appendChild(el);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    const placeholder = messagesDiv.querySelector('.system-msg:first-child');
    if (placeholder && placeholder !== el) placeholder.remove();
  }
</script>
</body>
</html>
