apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chatapp
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB,   value: chatapp }
            - { name: POSTGRES_USER, value: chatapp_user }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: chatapp-secrets, key: DB_PASSWORD } }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        # emptyDir = data lives only as long as the pod. Fine for this dev cluster;
        # swap to a PersistentVolumeClaim when we want durability.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chatapp
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
