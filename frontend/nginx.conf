# HTTPS is required for phone testing over LAN: the Web Crypto API (crypto.subtle,
# used for message decryption) only exists in secure contexts — https:// or localhost.
# Plain http://<LAN-IP> silently has no crypto.subtle and every message shows locked.
server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Proxy /auth, /api to backend
    location ~ ^/(auth|api)/ {
        proxy_pass         http://loadbalancer:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket /ws to backend
    location /ws {
        proxy_pass             http://loadbalancer:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;
    }

    # Serve React app — fallback to index.html for client-side routing
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}

# Plain HTTP on 80 — kept for http://localhost (a valid secure context on desktop).
# No redirect to HTTPS: a 301 turns same-origin fetches into cross-origin ones
# (http:// vs https:// are different origins) and breaks login with "Failed to fetch".
# Phones must use https://<LAN-IP> explicitly.
server {
    listen 80;

    location ~ ^/(auth|api)/ {
        proxy_pass         http://loadbalancer:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass             http://loadbalancer:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;
    }

    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
