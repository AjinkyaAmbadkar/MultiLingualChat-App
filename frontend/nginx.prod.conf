# Production nginx: serves the React build and proxies API/WS to the HAProxy load balancer.
# TLS is terminated upstream by Caddy, so this listens on plain HTTP :80 inside the Docker
# network only (no host port, no self-signed cert). Mounted over the image's default.conf
# via docker-compose.prod.yml.
server {
    listen 80;

    # Proxy /auth, /api to backend (via the sticky load balancer)
    location ~ ^/(auth|api)/ {
        proxy_pass         http://loadbalancer:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Proxy WebSocket /ws to backend
    location /ws {
        proxy_pass             http://loadbalancer:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout     3600s;
    }

    # Serve React app — fallback to index.html for client-side routing
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
