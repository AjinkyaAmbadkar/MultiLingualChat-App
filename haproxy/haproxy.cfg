global
    log stdout format raw local0 info

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client  1h
    timeout server  1h
    # tunnel timeout keeps long-lived WebSocket / SockJS connections open
    timeout tunnel  1h

# Use Docker's embedded DNS (127.0.0.11) to discover the scaled "backend" replicas.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 10s

frontend web
    bind *:8080
    default_backend chat_backends

backend chat_backends
    balance roundrobin

    # Sticky sessions: HAProxy sets a SERVERID cookie pinning each browser to one
    # backend instance. This is what makes SockJS work behind multiple instances —
    # every request from a given browser lands on the same backend.
    # "dynamic" derives the cookie value from the server + key (no manual per-server ids).
    cookie SERVERID insert indirect nocache dynamic
    dynamic-cookie-key "mlchat-sticky-key"

    # server-template creates up to 4 slots and fills them from the "backend" DNS name,
    # so `docker compose up --scale backend=N` (N up to 4) needs no config change.
    server-template chat 4 backend:8080 check resolvers docker init-addr none
